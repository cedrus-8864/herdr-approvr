# Approvr -- configuration
#
# Copy to your plugin config dir to customize:
#   herdr plugin config-dir cedrus.approvr
#
# All keys are optional; omitted keys use the defaults shown below.

# Notification sound name, e.g. "Ping", "Glass", "Submarine". Empty = silent.
sound = ""

# Stay quiet when the pane is already focused *and* the terminal is the
# frontmost app -- herdr's own in-app toast already tells you in that case.
suppress_when_focused = true

# Also notify when an agent finishes, not just when it needs an answer. There is
# nothing to answer, so that notification has no buttons; clicking it jumps to
# the pane. Turn this on if you set herdr's [ui.toast] delivery = "herdr" and
# still want a desktop notification when a run completes.
notify_done = false
