id = "cedrus.approvr"
name = "Approvr"
version = "0.2.0"
# Plugin v1 landed in 0.7.0, but whether those releases run [[build]] commands is
# unverified -- and without the bundle the notifications silently degrade to
# Terminal's identity. 0.7.5 is what this was actually tested against.
min_herdr_version = "0.7.5"
description = "Answer agent permission prompts straight from a macOS notification with real buttons (via alerter)."
platforms = ["macos"]

# Wrap alerter in our own .app bundle. Without it macOS files the notifications
# under Terminal, so their alert style cannot be set and the buttons vanish with
# the banner. Fatal on failure: a silent fallback would ship the broken UX.
[[build]]
command = ["./build-app.sh"]
platforms = ["macos"]

# Manual trigger for testing the notification UI on the focused pane:
#   herdr plugin action invoke cedrus.approvr.notify
[[actions]]
id = "notify"
title = "Notify for this pane's prompt"
contexts = ["pane"]
command = ["bun", "notify.js"]

[[events]]
on = "pane.agent_status_changed"
command = ["bun", "notify.js"]

# Landing on the pane makes its notification stale -- withdraw it.
[[events]]
on = "pane.focused"
command = ["bun", "notify.js"]
